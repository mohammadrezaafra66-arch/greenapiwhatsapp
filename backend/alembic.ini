# Alembic configuration for Afrakala WhatsApp Sender

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# Use the synchronous database URL for migrations.
# Override via the SYNC_DATABASE_URL environment variable in env.py.
sqlalchemy.url = postgresql://afrakala:password@localhost:5432/whatsapp_sender

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
