# Shared config for Celery workers (WORKER_MODE=1 → NullPool, see database.py).
x-worker-base: &worker-base
  build: ./backend
  restart: always
  env_file: .env
  environment:
    DATABASE_URL: postgresql+asyncpg://afrakala:password@db:5432/whatsapp_sender
    SYNC_DATABASE_URL: postgresql://afrakala:password@db:5432/whatsapp_sender
    REDIS_URL: redis://redis:6379/0
    WEBHOOK_BASE_URL: https://multidisciplinary-jeri-physiognomically.ngrok-free.dev
    WORKER_MODE: "1"
  depends_on:
    - db
    - redis
  volumes:
    - ./backend:/app

services:
  db:
    image: postgres:15-alpine
    restart: always
    # A1 — raise connection ceiling for many concurrent workers/accounts.
    command: postgres -c max_connections=300 -c shared_buffers=256MB
    environment:
      POSTGRES_USER: afrakala
      POSTGRES_PASSWORD: password
      POSTGRES_DB: whatsapp_sender
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No host port published — only reachable on the internal Docker network
    # as host "db". Avoids clashing with a local Postgres on 5432.

  redis:
    image: redis:7-alpine
    restart: always
    # No host port published — reachable internally as host "redis".
    # Avoids clashing with a local Redis on 6379.

  backend:
    build: ./backend
    restart: always
    env_file: .env
    # Override the localhost-based URLs from .env so the backend reaches the
    # db/redis *services* by name on the Docker network.
    environment:
      DATABASE_URL: postgresql+asyncpg://afrakala:password@db:5432/whatsapp_sender
      SYNC_DATABASE_URL: postgresql://afrakala:password@db:5432/whatsapp_sender
      REDIS_URL: redis://redis:6379/0
      WEBHOOK_BASE_URL: https://multidisciplinary-jeri-physiognomically.ngrok-free.dev
    ports:
      - "8002:8000"   # host 8002 (8000 is taken locally) -> container 8000
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # A2 — queue-isolated workers. Concurrency values are modest for a single host;
  # scale each up (esp. worker-sending) on production hardware for 80 accounts.
  worker-general:
    <<: *worker-base
    command: celery -A app.workers.celery_app worker -Q campaigns,extraction,backfill,celery,sending --concurrency=4 --loglevel=info -n general@%h

  worker-webhooks:
    <<: *worker-base
    command: celery -A app.workers.celery_app worker -Q webhooks --concurrency=4 --loglevel=info -n webhooks@%h

  beat:
    build: ./backend
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://afrakala:password@db:5432/whatsapp_sender
      SYNC_DATABASE_URL: postgresql://afrakala:password@db:5432/whatsapp_sender
      REDIS_URL: redis://redis:6379/0
      WEBHOOK_BASE_URL: https://multidisciplinary-jeri-physiognomically.ngrok-free.dev
      WORKER_MODE: "1"
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api/v1
    restart: always
    ports:
      - "3002:80"
    depends_on:
      - backend

volumes:
  postgres_data:
