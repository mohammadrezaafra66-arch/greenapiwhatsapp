server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy API calls to the backend service (same Docker network).
    # The frontend is built with VITE_API_BASE=/api/v1 so it uses relative paths.
    #
    # Using Docker's embedded DNS resolver (127.0.0.11) plus a variable in
    # proxy_pass defers upstream resolution to request time. This lets nginx
    # start even when the backend container is not up yet (it returns 502
    # instead of crashing at boot with "host not found in upstream").
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend "http://backend:8000";
        proxy_pass $backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Single-page app: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed build assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
